<!-- Password Generator Panel -->
<div class="space-y-6">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-white/5 pb-4 mb-6">
        <div>
            <h3 class="text-lg font-outfit font-bold text-white">Cryptographic Key Generator</h3>
            <p class="text-xs text-gray-400">Generate secure random passwords or memorable passphrases locally.</p>
        </div>
        <div class="mt-2 sm:mt-0 flex items-center space-x-2">
            <span class="text-xs text-gray-400">Security:</span>
            <span class="text-xs text-cyberaccent font-semibold uppercase" id="pwd-security-label">Strong</span>
        </div>
    </div>

    <!-- Output Display Banner -->
    <div class="bg-black/40 rounded-xl p-4 border border-white/5 space-y-3 relative overflow-hidden">
        <div class="absolute -right-32 -bottom-32 w-64 h-64 bg-cyberaccent/5 rounded-full blur-3xl pointer-events-none"></div>
        <div class="flex justify-between items-center mb-1">
            <span class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider">Generated Payload</span>
            <span class="text-[10px] text-gray-500 font-mono" id="pwd-entropy-display">Entropy: 0 bits</span>
        </div>
        <div class="flex items-center space-x-3">
            <div id="pwd-output-text" class="flex-1 text-base sm:text-lg font-mono text-white select-all break-all tracking-wider py-1 select-none">
                Click Generate to start
            </div>
            <div class="flex space-x-1.5 flex-shrink-0">
                <button id="btn-copy-pwd" title="Copy to Clipboard" class="p-2.5 rounded-lg text-cyberaccent hover:text-white border border-cyberaccent/20 hover:bg-cyberaccent/10 transition-all flex items-center justify-center">
                    <svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                </button>
                <button id="btn-refresh-pwd" title="Generate New" class="p-2.5 rounded-lg text-white hover:text-cyberneon border border-white/10 hover:bg-white/5 transition-all flex items-center justify-center">
                    <svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 7.89H18v3.5"></path></svg>
                </button>
            </div>
        </div>

        <!-- Strength bar -->
        <div class="space-y-1 pt-1.5">
            <div class="flex justify-between text-[9px] font-semibold">
                <span class="text-gray-400">Strength: <span id="pwd-strength-text" class="text-gray-400 uppercase">None</span></span>
                <span class="text-gray-500" id="pwd-strength-percent">0%</span>
            </div>
            <div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
                <div id="pwd-strength-bar" class="h-full bg-red-500 w-0 transition-all duration-300"></div>
            </div>
        </div>
    </div>

    <!-- Mode Selector Tabs -->
    <div class="flex border-b border-white/5 pb-1 gap-2">
        <button type="button" id="pwd-mode-rand-btn" class="pwd-tab-btn active px-3.5 py-1.5 rounded-lg text-xs font-semibold text-white bg-cyberaccent/10 border border-cyberaccent/20 transition-all">Random Password</button>
        <button type="button" id="pwd-mode-phrase-btn" class="pwd-tab-btn px-3.5 py-1.5 rounded-lg text-xs font-semibold text-gray-400 border border-white/5 hover:text-white transition-all">Memorable Passphrase</button>
    </div>

    <!-- Options Panels -->
    <div class="space-y-4">
        <!-- Panel: Random Password Options -->
        <div id="pwd-panel-rand" class="pwd-opts-panel space-y-4">
            <div class="space-y-2">
                <div class="flex justify-between text-xs font-semibold">
                    <label for="pwd-rand-len" class="text-gray-400 uppercase tracking-wider">Password Length</label>
                    <span class="text-cyberaccent font-mono" id="pwd-rand-len-display">16 characters</span>
                </div>
                <input type="range" id="pwd-rand-len" min="6" max="64" value="16" class="w-full h-1.5 bg-white/10 rounded-lg appearance-none cursor-pointer accent-cyberaccent" />
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3.5 bg-black/10 p-4 rounded-xl border border-white/5">
                <label class="flex items-center space-x-3 cursor-pointer group text-xs text-gray-300">
                    <input type="checkbox" id="pwd-opt-upper" checked class="rounded border-white/10 bg-transparent text-cyberaccent focus:ring-cyberaccent focus:ring-opacity-25 w-4 h-4 accent-cyberaccent" />
                    <span>Uppercase (A-Z)</span>
                </label>
                <label class="flex items-center space-x-3 cursor-pointer group text-xs text-gray-300">
                    <input type="checkbox" id="pwd-opt-lower" checked class="rounded border-white/10 bg-transparent text-cyberaccent focus:ring-cyberaccent focus:ring-opacity-25 w-4 h-4 accent-cyberaccent" />
                    <span>Lowercase (a-z)</span>
                </label>
                <label class="flex items-center space-x-3 cursor-pointer group text-xs text-gray-300">
                    <input type="checkbox" id="pwd-opt-number" checked class="rounded border-white/10 bg-transparent text-cyberaccent focus:ring-cyberaccent focus:ring-opacity-25 w-4 h-4 accent-cyberaccent" />
                    <span>Numbers (0-9)</span>
                </label>
                <label class="flex items-center space-x-3 cursor-pointer group text-xs text-gray-300">
                    <input type="checkbox" id="pwd-opt-symbol" checked class="rounded border-white/10 bg-transparent text-cyberaccent focus:ring-cyberaccent focus:ring-opacity-25 w-4 h-4 accent-cyberaccent" />
                    <span>Special Symbols (!@#$%...)</span>
                </label>
                <label class="flex items-center space-x-3 cursor-pointer sm:col-span-2 border-t border-white/5 pt-2.5 mt-1 group text-xs text-gray-400">
                    <input type="checkbox" id="pwd-opt-similar" checked class="rounded border-white/10 bg-transparent text-cyberaccent focus:ring-cyberaccent focus:ring-opacity-25 w-4 h-4 accent-cyberaccent" />
                    <span>Avoid Similar Characters (e.g. i, l, 1, L, o, 0, O)</span>
                </label>
            </div>
        </div>

        <!-- Panel: Passphrase Options -->
        <div id="pwd-panel-phrase" class="pwd-opts-panel hidden space-y-4">
            <div class="space-y-2">
                <div class="flex justify-between text-xs font-semibold">
                    <label for="pwd-phrase-words" class="text-gray-400 uppercase tracking-wider">Number of Words</label>
                    <span class="text-cyberaccent font-mono" id="pwd-phrase-words-display">4 words</span>
                </div>
                <input type="range" id="pwd-phrase-words" min="3" max="10" value="4" class="w-full h-1.5 bg-white/10 rounded-lg appearance-none cursor-pointer accent-cyberaccent" />
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 bg-black/10 p-4 rounded-xl border border-white/5">
                <div class="space-y-1">
                    <label for="pwd-phrase-sep" class="block text-[10px] font-semibold text-gray-400 uppercase tracking-wider">Word Separator</label>
                    <input type="text" id="pwd-phrase-sep" value="-" maxlength="3" class="w-full px-3 py-1.5 rounded-lg glass-input text-xs font-mono text-center" />
                </div>
                <div class="flex flex-col justify-end space-y-2.5">
                    <label class="flex items-center space-x-3 cursor-pointer group text-xs text-gray-300">
                        <input type="checkbox" id="pwd-phrase-cap" checked class="rounded border-white/10 bg-transparent text-cyberaccent focus:ring-cyberaccent focus:ring-opacity-25 w-4 h-4 accent-cyberaccent" />
                        <span>Capitalize Words</span>
                    </label>
                    <label class="flex items-center space-x-3 cursor-pointer group text-xs text-gray-300">
                        <input type="checkbox" id="pwd-phrase-num" class="rounded border-white/10 bg-transparent text-cyberaccent focus:ring-cyberaccent focus:ring-opacity-25 w-4 h-4 accent-cyberaccent" />
                        <span>Insert Random Number</span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- Alert / Toast Banner -->
    <div id="pwd-copy-toast" class="hidden p-3 bg-cyberaccent/10 border border-cyberaccent/30 rounded-lg text-center animate-pulse">
        <p class="text-xs text-cyberaccent font-bold">📋 Password copied to clipboard!</p>
    </div>
</div>
