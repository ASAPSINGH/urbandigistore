<!-- Diff Checker Interactive Panel -->
<div class="space-y-6">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-white/5 pb-4 mb-6">
        <div>
            <h3 class="text-lg font-outfit font-bold text-white">Visual Text Comparator</h3>
            <p class="text-xs text-gray-400">Compute additions and deletions between two text sequences locally.</p>
        </div>
        <div class="mt-2 sm:mt-0 flex items-center space-x-2">
            <span class="text-xs text-gray-400">Context:</span>
            <span class="text-xs text-cyberneon font-semibold uppercase" id="diff-use-case-label">Text</span>
        </div>
    </div>

    <!-- Inputs Textareas Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Original Input -->
        <div class="space-y-2">
            <div class="flex justify-between items-center">
                <label for="diff-input-orig" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">Original Text</label>
                <button id="btn-clear-orig" class="text-xs text-gray-500 hover:text-red-400 transition-colors">Clear</button>
            </div>
            <textarea id="diff-input-orig" rows="8" placeholder="Paste original text here..." class="w-full px-4 py-3 rounded-lg glass-input text-xs font-mono"></textarea>
        </div>

        <!-- Modified Input -->
        <div class="space-y-2">
            <div class="flex justify-between items-center">
                <label for="diff-input-mod" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">Modified Text</label>
                <button id="btn-clear-mod" class="text-xs text-gray-500 hover:text-red-400 transition-colors">Clear</button>
            </div>
            <textarea id="diff-input-mod" rows="8" placeholder="Paste modified text here..." class="w-full px-4 py-3 rounded-lg glass-input text-xs font-mono"></textarea>
        </div>
    </div>

    <!-- Settings Controls -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 pt-4 border-t border-white/5 items-end">
        <div>
            <label for="diff-mode-select" class="block text-[10px] font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Comparison Mode</label>
            <select id="diff-mode-select" class="w-full px-3 py-2 rounded-lg glass-input text-xs bg-darkbg">
                <option value="line" selected>Line-by-Line</option>
                <option value="word">Word-by-Word</option>
                <option value="char">Character-by-Character</option>
            </select>
        </div>
        <div>
            <label for="diff-layout-select" class="block text-[10px] font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Display Layout</label>
            <select id="diff-layout-select" class="w-full px-3 py-2 rounded-lg glass-input text-xs bg-darkbg">
                <option value="split" selected>Split (Side-by-Side)</option>
                <option value="unified">Unified (Inline)</option>
            </select>
        </div>
        <button id="btn-compare-diff" class="btn-neon py-2.5 rounded-lg text-xs font-semibold text-white tracking-wide uppercase">
            Compare Text
        </button>
    </div>

    <!-- Diff Results Panel (Hidden initially) -->
    <div id="diff-results-container" class="hidden space-y-4 pt-4 border-t border-white/5">
        <h4 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Comparison Output</h4>
        
        <!-- Legend -->
        <div class="flex items-center space-x-4 text-[10px] font-semibold">
            <span class="flex items-center text-red-400">
                <span class="w-2.5 h-2.5 bg-red-500/20 border border-red-500/30 rounded mr-1.5 flex-shrink-0"></span> Deletions
            </span>
            <span class="flex items-center text-green-400">
                <span class="w-2.5 h-2.5 bg-green-500/20 border border-green-500/30 rounded mr-1.5 flex-shrink-0"></span> Additions
            </span>
        </div>

        <!-- Render Target: Split view -->
        <div id="diff-output-split" class="grid grid-cols-1 md:grid-cols-2 gap-6 font-mono text-xs overflow-x-auto bg-black/35 rounded-xl border border-white/5 p-4 max-h-[350px]">
            <!-- Side-by-side output lists -->
            <div id="diff-orig-output-list" class="space-y-1 select-none"></div>
            <div id="diff-mod-output-list" class="space-y-1 select-none"></div>
        </div>

        <!-- Render Target: Unified view -->
        <div id="diff-output-unified" class="hidden font-mono text-xs overflow-x-auto bg-black/35 rounded-xl border border-white/5 p-4 max-h-[350px] leading-relaxed whitespace-pre-wrap select-none">
            <!-- Inline string difference -->
        </div>
    </div>

    <!-- Include external libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.2.0/diff.min.js" defer></script>
</div>
