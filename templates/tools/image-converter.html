<!-- Image Converter Interactive Panel -->
<div class="space-y-6">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-white/5 pb-4 mb-6">
        <div>
            <h3 class="text-lg font-outfit font-bold text-white">Media Converter Gateway</h3>
            <p class="text-xs text-gray-400">Perform secure and high-fidelity file conversions.</p>
        </div>
        <div class="mt-2 sm:mt-0 flex items-center space-x-2">
            <select id="ic-input-select" class="glass-input text-xs px-2.5 py-1.5 rounded-lg text-white border border-white/10 bg-darkbg focus:outline-none focus:border-cyberneon font-bold">
                <option value="png">PNG</option>
                <option value="jpg">JPG</option>
                <option value="webp">WEBP</option>
            </select>
            <span class="text-xs text-gray-500">to</span>
            <select id="ic-output-select" class="glass-input text-xs px-2.5 py-1.5 rounded-lg text-white border border-white/10 bg-darkbg focus:outline-none focus:border-cyberneon font-bold">
                <option value="webp">WEBP</option>
                <option value="png">PNG</option>
                <option value="jpg">JPG</option>
            </select>
        </div>
    </div>

    <!-- Drag & Drop Zone -->
    <div id="drop-zone" class="border-2 border-dashed border-white/10 hover:border-cyberneon/40 rounded-xl p-8 text-center transition-all bg-black/25 cursor-pointer relative group">
        <input type="file" id="image-input" class="hidden" accept="" />
        <div class="space-y-4">
            <div class="w-12 h-12 mx-auto bg-white/5 rounded-full flex items-center justify-center text-gray-400 group-hover:text-cyberneon group-hover:bg-cyberneon/10 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            </div>
            <div>
                <p class="text-sm text-gray-200 font-medium">Drag and drop your <span class="text-cyberneon font-bold" id="label-input-fmt">image</span> here</p>
                <p class="text-xs text-gray-400 mt-1">or click to browse local files</p>
            </div>
        </div>
    </div>

    <!-- Uploaded File Details (Hidden initially) -->
    <div id="file-info" class="hidden p-4 bg-white/5 rounded-lg border border-white/5 flex items-center justify-between">
        <div class="flex items-center space-x-3 overflow-hidden">
            <!-- Icon -->
            <div class="p-2 bg-white/5 rounded text-cyberneon">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            </div>
            <div class="overflow-hidden">
                <p id="info-name" class="text-sm font-medium text-white truncate"></p>
                <p id="info-size" class="text-xs text-gray-400"></p>
            </div>
        </div>
        <button id="btn-remove-file" class="text-gray-400 hover:text-red-400 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
        </button>
    </div>

    <!-- Convert Button -->
    <button id="btn-convert" class="btn-neon w-full py-3.5 rounded-xl text-sm font-semibold text-white tracking-wide uppercase disabled:opacity-50 disabled:pointer-events-none" disabled>
        Convert and Download
    </button>
    
    <!-- Success Alert (Hidden initially) -->
    <div id="alert-success" class="hidden p-4 bg-green-500/10 border border-green-500/30 rounded-lg text-center">
        <p class="text-sm text-green-400 font-semibold flex items-center justify-center">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            Conversion Complete! Download triggered.
        </p>
    </div>
</div>
