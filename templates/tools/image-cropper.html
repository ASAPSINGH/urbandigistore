<!-- Image Cropper Interactive Panel -->
<div class="space-y-6">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-white/5 pb-4 mb-6">
        <div>
            <h3 class="text-lg font-outfit font-bold text-white">Precision Image Cropping</h3>
            <p class="text-xs text-gray-400">Lock ratios and download optimized images.</p>
        </div>
        <div class="mt-2 sm:mt-0 flex items-center space-x-2">
            <label for="cropper-platform-select" class="text-xs text-gray-400">Target Layout:</label>
            <select id="cropper-platform-select" class="glass-input text-xs px-3 py-1.5 rounded-lg text-white border border-white/10 bg-darkbg focus:outline-none focus:border-cyberneon">
                <option value="instagram-post">Instagram Post (1:1)</option>
                <option value="instagram-story">Instagram Story (9:16)</option>
                <option value="youtube-banner">YouTube Banner (16:9)</option>
                <option value="twitter-header">Twitter / X Header (3:1)</option>
                <option value="linkedin-cover">LinkedIn Cover (4:1)</option>
            </select>
        </div>
    </div>

    <!-- Drag & Drop Zone -->
    <div id="drop-zone" class="border-2 border-dashed border-white/10 hover:border-cyberneon/40 rounded-xl p-8 text-center transition-all bg-black/25 cursor-pointer relative group">
        <input type="file" id="image-input" class="hidden" accept="image/*" />
        <div class="space-y-4">
            <div class="w-12 h-12 mx-auto bg-white/5 rounded-full flex items-center justify-center text-gray-400 group-hover:text-cyberneon group-hover:bg-cyberneon/10 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            </div>
            <div>
                <p class="text-sm text-gray-200 font-medium">Select source image to crop</p>
                <p class="text-xs text-gray-400 mt-1">Aspect ratio is locked automatically to the destination layout</p>
            </div>
        </div>
    </div>

    <!-- Cropping Workspace (Hidden initially) -->
    <div id="crop-workspace" class="hidden space-y-6">
        <!-- Live Preview Canvas Container -->
        <div class="glass-input rounded-xl p-4 flex flex-col items-center justify-center relative overflow-hidden bg-black/40">
            <p class="text-xs text-gray-400 mb-2">Live Bounding Crop Preview</p>
            <div class="max-w-full max-h-[300px] overflow-auto flex items-center justify-center border border-white/5 rounded relative">
                <canvas id="crop-canvas" class="max-w-full h-auto shadow-lg bg-checkered"></canvas>
            </div>
        </div>

        <!-- Offset Positioning Controls -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Horizontal Align (X)</label>
                <input type="range" id="crop-x" min="0" max="100" value="50" class="w-full h-1 bg-white/10 rounded-lg appearance-none cursor-pointer accent-cyberneon" />
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Vertical Align (Y)</label>
                <input type="range" id="crop-y" min="0" max="100" value="50" class="w-full h-1 bg-white/10 rounded-lg appearance-none cursor-pointer accent-cyberneon" />
            </div>
        </div>

        <!-- Scale Modifier -->
        <div>
            <label class="flex justify-between items-center text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">
                <span>Zoom Factor</span>
                <span id="zoom-value" class="font-mono text-cyberaccent">100%</span>
            </label>
            <input type="range" id="crop-zoom" min="100" max="300" value="100" class="w-full h-1 bg-white/10 rounded-lg appearance-none cursor-pointer accent-cyberneon" />
        </div>

        <!-- Action Button -->
        <button id="btn-crop-download" class="btn-neon w-full py-3.5 rounded-xl text-sm font-semibold text-white tracking-wide uppercase">
            Crop & Download Optimized Image
        </button>
    </div>
</div>
