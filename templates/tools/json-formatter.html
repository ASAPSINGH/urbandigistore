<!-- JSON Formatter Panel -->
<div class="space-y-6">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-white/5 pb-4 mb-6">
        <div>
            <h3 class="text-lg font-outfit font-bold text-white">JSON Structural Optimizer</h3>
            <p class="text-xs text-gray-400">Beautify, compact, and validate object configurations.</p>
        </div>
        <div class="mt-2 sm:mt-0 px-3 py-1.5 rounded-lg bg-cyberaccent/10 border border-cyberaccent/20 flex items-center space-x-2">
            <span class="w-1.5 h-1.5 rounded-full bg-cyberaccent"></span>
            <span class="text-[10px] text-cyberaccent font-semibold uppercase tracking-wider" id="json-badge-usecase">
                Loading Setup...
            </span>
        </div>
    </div>

    <!-- Main Editor Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <!-- Input Textarea -->
        <div class="space-y-2">
            <div class="flex justify-between items-center">
                <label for="json-input" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">Raw JSON Input</label>
                <button id="btn-clear-json" class="text-xs text-gray-500 hover:text-red-400 transition-colors">Clear</button>
            </div>
            <textarea id="json-input" rows="12" placeholder='{"status": "paste raw JSON here", "success": true, "list": [1, 2, 3]}' class="w-full px-4 py-3 rounded-lg glass-input text-xs font-mono"></textarea>
        </div>

        <!-- Output Textarea -->
        <div class="space-y-2">
            <div class="flex justify-between items-center">
                <label for="json-output" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">Processed Output</label>
                <button id="btn-copy-json" class="text-xs text-cyberaccent hover:underline font-semibold">Copy Output</button>
            </div>
            <textarea id="json-output" rows="12" class="w-full px-4 py-3 rounded-lg glass-input text-xs font-mono bg-black/40" readonly placeholder="Output will appear here..."></textarea>
        </div>
    </div>

    <!-- Error/Validation Dashboard (Hidden unless error occurs) -->
    <div id="json-error-panel" class="hidden p-4 bg-red-500/10 border border-red-500/30 rounded-lg">
        <p class="text-xs text-red-400 font-bold mb-1">❌ Invalid JSON Syntax:</p>
        <p id="json-error-message" class="text-xs text-gray-400 font-mono"></p>
    </div>

    <!-- Control Actions -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 pt-4 border-t border-white/5">
        <div>
            <label for="json-indent" class="block text-[10px] font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Tab Indentation</label>
            <select id="json-indent" class="w-full px-3 py-2 rounded-lg glass-input text-xs">
                <option value="2">2 Spaces</option>
                <option value="4" selected>4 Spaces</option>
                <option value="tab">Tab Character</option>
            </select>
        </div>
        <button id="btn-format-json" class="btn-neon py-2 rounded-lg text-xs font-semibold text-white tracking-wide uppercase">
            Beautify (Prettify)
        </button>
        <button id="btn-minify-json" class="border border-cyberaccent/30 hover:border-cyberaccent py-2 rounded-lg text-xs font-semibold text-cyberaccent tracking-wide uppercase bg-cyberaccent/5">
            Minify (Compact)
        </button>
    </div>
</div>
