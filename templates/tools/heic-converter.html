<!-- HEIC Converter Interactive Panel -->
<div class="space-y-6">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-white/5 pb-4 mb-6">
        <div>
            <h3 class="text-lg font-outfit font-bold text-white">HEIC Image Converter</h3>
            <p class="text-xs text-gray-400">Convert Apple HEIC/HEIF images to standard formats locally in your browser.</p>
        </div>
        <div class="mt-2 sm:mt-0 flex items-center space-x-2">
            <select id="heic-output-select" class="glass-input text-xs px-2.5 py-1.5 rounded-lg text-white border border-white/10 bg-darkbg focus:outline-none focus:border-cyberneon font-bold">
                <option value="jpg">JPG</option>
                <option value="png">PNG</option>
            </select>
        </div>
    </div>

    <!-- Drag & Drop Zone -->
    <div id="heic-drop-zone" class="border-2 border-dashed border-white/10 hover:border-cyberneon/40 rounded-xl p-8 text-center transition-all bg-black/25 cursor-pointer relative group">
        <input type="file" id="heic-input" class="hidden" accept=".heic,.heif" multiple />
        <div class="space-y-4">
            <div class="w-12 h-12 mx-auto bg-white/5 rounded-full flex items-center justify-center text-gray-400 group-hover:text-cyberneon group-hover:bg-cyberneon/10 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            </div>
            <div>
                <p class="text-sm text-gray-200 font-medium">Select or drag & drop HEIC files here</p>
                <p class="text-xs text-gray-400 mt-1">Files are converted locally in browser memory (zero server uploads)</p>
            </div>
        </div>
    </div>

    <!-- Queue List (Hidden initially) -->
    <div id="heic-queue-container" class="hidden space-y-3">
        <div class="flex justify-between items-center">
            <h4 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Queue (<span id="heic-queue-count">0</span> files)</h4>
            <button id="btn-clear-heic" class="text-xs text-gray-500 hover:text-red-400 transition-colors">Clear All</button>
        </div>
        <ul id="heic-queue-list" class="divide-y divide-white/5 bg-black/20 rounded-xl border border-white/5 overflow-hidden">
            <!-- Dynamically populated -->
        </ul>
    </div>

    <!-- Convert Button -->
    <button id="btn-convert-heic" class="btn-neon w-full py-3.5 rounded-xl text-sm font-semibold text-white tracking-wide uppercase disabled:opacity-50 disabled:pointer-events-none" disabled>
        Convert and Download
    </button>
    
    <!-- Status / Success Alerts -->
    <div id="heic-alert-success" class="hidden p-4 bg-green-500/10 border border-green-500/30 rounded-lg text-center">
        <p class="text-sm text-green-400 font-semibold flex items-center justify-center">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            Conversion Complete! Converted images downloaded.
        </p>
    </div>

    <div id="heic-alert-error" class="hidden p-4 bg-red-500/10 border border-red-500/30 rounded-lg">
        <p class="text-xs text-red-400 font-bold mb-1">❌ Conversion Error:</p>
        <p id="heic-error-message" class="text-xs text-gray-400 font-mono"></p>
    </div>

    <!-- Include external libraries -->
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js" defer></script>
</div>
