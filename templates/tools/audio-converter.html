<!-- Audio Converter Panel -->
<div class="space-y-6">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-white/5 pb-4 mb-6">
        <div>
            <h3 class="text-lg font-outfit font-bold text-white">Universal Audio Converter</h3>
            <p class="text-xs text-gray-400">Convert WAV, M4A, OGG, WebM, or FLAC files to standard formats in-browser.</p>
        </div>
        <div class="mt-2 sm:mt-0 flex items-center space-x-2">
            <span class="text-xs text-gray-400">Source:</span>
            <span class="text-xs text-cyberneon font-semibold uppercase" id="ac-input-label">WAV</span>
        </div>
    </div>

    <!-- Drag & Drop Zone -->
    <div id="ac-drop-zone" class="border-2 border-dashed border-white/10 hover:border-cyberneon/40 rounded-xl p-8 text-center transition-all bg-black/25 cursor-pointer relative group">
        <input type="file" id="ac-file-input" class="hidden" accept="audio/*" />
        <div class="space-y-4">
            <div class="w-12 h-12 mx-auto bg-white/5 rounded-full flex items-center justify-center text-gray-400 group-hover:text-cyberneon group-hover:bg-cyberneon/10 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
            </div>
            <div>
                <p class="text-sm text-gray-200 font-medium">Select or drag & drop audio file here</p>
                <p class="text-xs text-gray-400 mt-1">Supports WAV, M4A, OGG, WebM, FLAC, and MP3 (zero server uploads)</p>
            </div>
        </div>
    </div>

    <!-- Active Workbench (Hidden initially) -->
    <div id="ac-workbench" class="hidden space-y-6">
        <!-- File details card -->
        <div class="bg-black/20 rounded-xl border border-white/5 p-4 flex items-center justify-between">
            <div class="overflow-hidden mr-4">
                <p id="ac-file-name" class="font-medium text-white truncate max-w-[280px] sm:max-w-[450px]">audio.wav</p>
                <p id="ac-file-size" class="text-[10px] text-gray-500 font-mono mt-0.5">0.0 MB</p>
            </div>
            <button id="btn-remove-audio" class="p-1.5 rounded bg-white/5 hover:bg-red-500/20 hover:text-red-400 transition" title="Remove">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </button>
        </div>

        <!-- Conversion Settings -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 bg-black/10 p-4 rounded-xl border border-white/5">
            <div>
                <label for="ac-format-select" class="block text-[10px] font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Output Format</label>
                <select id="ac-format-select" class="w-full px-3 py-2 rounded-lg glass-input text-xs bg-darkbg">
                    <option value="mp3" selected>MP3 (Compressed)</option>
                    <option value="wav">WAV (Lossless PCM)</option>
                </select>
            </div>
            
            <div id="ac-bitrate-container">
                <label for="ac-bitrate-select" class="block text-[10px] font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Target Bitrate</label>
                <select id="ac-bitrate-select" class="w-full px-3 py-2 rounded-lg glass-input text-xs bg-darkbg">
                    <option value="128">128 kbps (Standard)</option>
                    <option value="192" selected>192 kbps (High Quality)</option>
                    <option value="320">320 kbps (Extreme/Slow)</option>
                </select>
            </div>
        </div>

        <!-- Progress Indicator -->
        <div id="ac-progress-block" class="hidden space-y-2">
            <div class="flex justify-between text-xs font-semibold">
                <span id="ac-progress-status" class="text-gray-400 animate-pulse">Converting audio file...</span>
                <span id="ac-progress-val" class="text-cyberneon font-mono">0%</span>
            </div>
            <div class="w-full bg-white/10 rounded-full h-1.5 overflow-hidden">
                <div id="ac-progress-bar" class="bg-cyberneon h-full transition-all duration-150" style="width: 0%"></div>
            </div>
        </div>

        <!-- Action Convert Button -->
        <button id="btn-convert-audio" class="btn-neon w-full py-3.5 rounded-xl text-xs font-semibold text-white tracking-wide uppercase">
            Convert & Download
        </button>
    </div>

    <!-- Include LAME MP3 Encoder via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js" defer></script>
</div>
