<!-- UTM Link Builder Panel -->
<div class="space-y-6">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-white/5 pb-4 mb-6">
        <div>
            <h3 class="text-lg font-outfit font-bold text-white">Campaign Link Configurator</h3>
            <p class="text-xs text-gray-400">Generate tags to track traffic origin.</p>
        </div>
        <div class="mt-2 sm:mt-0 px-3 py-1.5 rounded-lg bg-cyberaccent/10 border border-cyberaccent/20 flex items-center space-x-2">
            <span class="w-1.5 h-1.5 rounded-full bg-cyberaccent"></span>
            <span class="text-[10px] text-cyberaccent font-semibold uppercase tracking-wider" id="utm-badge-platform">
                Loading Platform...
            </span>
        </div>
    </div>

    <!-- Inputs -->
    <div class="space-y-4">
        <div>
            <label for="utm-url" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Destination Website URL <span class="text-red-400">*</span></label>
            <input type="url" id="utm-url" placeholder="https://example.com" class="w-full px-4 py-3 rounded-lg glass-input text-sm" required />
            <p class="text-[10px] text-gray-500 mt-1">The primary landing page address (must start with http:// or https://).</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label for="utm-source" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Campaign Source (utm_source) <span class="text-red-400">*</span></label>
                <input type="text" id="utm-source" placeholder="e.g. facebook" class="w-full px-4 py-3 rounded-lg glass-input text-sm" required />
            </div>
            <div>
                <label for="utm-medium" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Campaign Medium (utm_medium) <span class="text-red-400">*</span></label>
                <input type="text" id="utm-medium" placeholder="e.g. cpc" class="w-full px-4 py-3 rounded-lg glass-input text-sm" required />
            </div>
        </div>

        <div>
            <label for="utm-name" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Campaign Name (utm_campaign) <span class="text-red-400">*</span></label>
            <input type="text" id="utm-name" placeholder="e.g. summer_promo" class="w-full px-4 py-3 rounded-lg glass-input text-sm" required />
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label for="utm-term" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Campaign Term (utm_term)</label>
                <input type="text" id="utm-term" placeholder="e.g. marketing_tools" class="w-full px-4 py-3 rounded-lg glass-input text-sm" />
            </div>
            <div>
                <label for="utm-content" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Campaign Content (utm_content)</label>
                <input type="text" id="utm-content" placeholder="e.g. banner_ad" class="w-full px-4 py-3 rounded-lg glass-input text-sm" />
            </div>
        </div>
    </div>

    <!-- Output Box -->
    <div class="pt-6 border-t border-white/5 space-y-3">
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">Generated Campaign URL</label>
        <div class="flex items-center space-x-2">
            <input type="text" id="utm-result" class="flex-grow px-4 py-3.5 rounded-lg glass-input text-sm text-cyberaccent font-mono bg-black/40 select-all" readonly placeholder="Fill out required fields to generate tracking URL..." />
            <button id="btn-copy-utm" class="px-5 py-3.5 rounded-lg bg-cyberaccent hover:bg-cyberaccent/85 transition text-white text-sm font-semibold whitespace-nowrap">
                Copy Link
            </button>
        </div>
    </div>
</div>
